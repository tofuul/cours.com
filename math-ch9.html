<h2>Notions importantes</h2>
<ul>
<li>Variable aléatoire X : fonction Ω → R</li>
<li>Espérance : E(X) = Σ x_i·P(X=x_i)</li>
<li>Variance : Var(X) = E(X²) - [E(X)]²</li>
<li>Écart-type : σ(X) = √Var(X)</li>
<li>Exemple : loi binomiale, loi uniforme</li>
</ul>
